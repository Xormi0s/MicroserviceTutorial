services:
  mysql:
    image: mysql:8.3.0
    container_name: mysql_microservices
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: microservices_tutorial
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/initsql
      - db-data:/var/lib/mysql
      - db-data:/var/log/mysql

volumes:
  db-data: